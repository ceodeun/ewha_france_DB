<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ewha France DB — 이화 불문과 커뮤니티</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#1a5c3a;--green2:#23754a;--green3:#0f3d26;--green-light:#e8f5ee;--green-mid:#b8ddc8;
  --gold:#c9a84c;--gold2:#e8c96a;
  --white:#fff;--g50:#f5f8f6;--g100:#e8efe9;--g200:#ccd9d0;--g400:#8aA090;--g600:#4a5e52;--g800:#1e2e24;
  --r-sm:8px;--r-md:12px;--r-lg:16px;--r-xl:24px;--r-full:100px;
  --shadow:0 1px 4px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
  --shadow-lg:0 8px 32px rgba(0,0,0,.14);
}
html{scroll-behavior:smooth;}
body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--g50);color:var(--g800);-webkit-font-smoothing:antialiased;font-size:14px;}
.hidden{display:none!important;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;font-family:inherit;font-size:14px;font-weight:600;padding:0 16px;height:38px;border-radius:var(--r-full);cursor:pointer;transition:all .15s;border:none;white-space:nowrap;}
.btn-primary{background:var(--green);color:#fff;}.btn-primary:hover{background:var(--green3);}
.btn-ghost{background:transparent;color:var(--g600);border:1.5px solid var(--g200);}.btn-ghost:hover{border-color:var(--g400);}
.btn-sm{height:32px;padding:0 12px;font-size:13px;}
.btn-danger{background:#fef2f2;color:#dc2626;border:none;}.btn-danger:hover{background:#fee2e2;}
.input,.select,.textarea{font-family:inherit;font-size:14px;width:100%;padding:10px 12px;border:1.5px solid var(--g200);border-radius:var(--r-md);outline:none;color:var(--g800);background:var(--white);transition:border-color .15s;}
.input:focus,.select:focus,.textarea:focus{border-color:var(--green);}
.input::placeholder,.textarea::placeholder{color:var(--g400);}
.textarea{resize:vertical;min-height:100px;line-height:1.6;}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:700;padding:3px 8px;border-radius:var(--r-full);}
.badge-green{background:var(--green-light);color:var(--green);}
.badge-gold{background:#fdf6e3;color:#9a6f1a;}
.badge-gray{background:var(--g100);color:var(--g600);}
.badge-blue{background:#eff6ff;color:#2563eb;}
.card{background:var(--white);border-radius:var(--r-lg);border:1.5px solid var(--g100);padding:20px;}
.divider{height:1px;background:var(--g100);margin:16px 0;}
.toast-container{position:fixed;bottom:24px;right:24px;z-index:2000;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--g800);color:#fff;padding:12px 18px;border-radius:var(--r-lg);font-size:14px;font-weight:500;box-shadow:var(--shadow-lg);animation:slideUp .25s ease;max-width:320px;}
.toast.success{background:var(--green);}.toast.error{background:#dc2626;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-box{background:var(--white);border-radius:var(--r-xl);padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-title{font-size:18px;font-weight:800;}
.modal-close{background:var(--g100);border:none;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--g600);}
.modal-close:hover{background:var(--g200);}
.form-stack{display:flex;flex-direction:column;gap:14px;}
.input-group{display:flex;flex-direction:column;gap:6px;}
.input-group label{font-size:13px;font-weight:600;color:var(--g600);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

/* ── AUTH ── */
#screen-auth{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--green3) 0%,var(--green) 50%,#2a7a50 100%);padding:2rem;position:relative;overflow:hidden;}
.auth-deco{position:absolute;pointer-events:none;user-select:none;}
.auth-deco-eiffel{bottom:20px;right:40px;font-size:120px;opacity:.07;transform:rotate(-5deg);}
.auth-deco-petal1{top:60px;left:60px;font-size:60px;opacity:.12;animation:float 4s ease-in-out infinite;}
.auth-deco-petal2{top:200px;right:120px;font-size:40px;opacity:.1;animation:float 5s ease-in-out infinite 1s;}
.auth-deco-petal3{bottom:150px;left:100px;font-size:50px;opacity:.08;animation:float 6s ease-in-out infinite 2s;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.auth-box{background:rgba(255,255,255,.97);border-radius:var(--r-xl);padding:40px;width:100%;max-width:420px;box-shadow:var(--shadow-lg);position:relative;z-index:1;}
.auth-emblem{text-align:center;font-size:40px;margin-bottom:6px;}
.auth-title{text-align:center;font-size:22px;font-weight:800;color:var(--green3);margin-bottom:2px;}
.auth-subtitle{text-align:center;font-size:13px;color:var(--g400);margin-bottom:4px;}
.auth-france{text-align:center;font-size:12px;color:var(--g400);margin-bottom:24px;letter-spacing:1px;}
.auth-tabs{display:grid;grid-template-columns:1fr 1fr;gap:4px;background:var(--g50);border-radius:var(--r-md);padding:4px;margin-bottom:24px;}
.auth-tab{padding:8px;text-align:center;font-size:13px;font-weight:600;color:var(--g400);cursor:pointer;border-radius:var(--r-sm);transition:all .15s;}
.auth-tab.active{background:var(--white);color:var(--green);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.auth-hint{font-size:12px;color:var(--g400);text-align:center;margin-top:14px;line-height:1.7;}
.auth-hint strong{color:var(--green);}

/* ── APP ── */
#screen-app{display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:var(--green);color:#fff;padding:0 2rem;height:58px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15);}
.topbar-brand{display:flex;align-items:center;gap:10px;cursor:pointer;}
.topbar-logo-icon{font-size:22px;}
.topbar-logo-text{font-size:17px;font-weight:800;letter-spacing:-.3px;}
.topbar-logo-text span{color:var(--gold2);}
.topbar-nav{display:flex;gap:2px;}
.topbar-nav-item{padding:7px 13px;border-radius:var(--r-full);font-size:13px;font-weight:600;cursor:pointer;color:rgba(255,255,255,.75);transition:all .15s;}
.topbar-nav-item:hover{background:rgba(255,255,255,.12);color:#fff;}
.topbar-nav-item.active{background:rgba(255,255,255,.18);color:#fff;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.topbar-nick{font-size:13px;color:rgba(255,255,255,.8);}
.topbar-logout{background:rgba(255,255,255,.12);border:none;color:rgba(255,255,255,.75);padding:6px 12px;border-radius:var(--r-full);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;}
.topbar-logout:hover{background:rgba(255,255,255,.22);color:#fff;}

/* hero banner */
.hero-banner{background:linear-gradient(120deg,var(--green) 0%,var(--green2) 100%);color:#fff;padding:28px 2rem;position:relative;overflow:hidden;}
.hero-banner::before{content:'🗼';position:absolute;right:60px;top:50%;transform:translateY(-50%);font-size:80px;opacity:.1;}
.hero-banner::after{content:'🌸';position:absolute;right:200px;top:10px;font-size:40px;opacity:.15;}
.hero-banner-inner{max-width:1100px;margin:0 auto;}
.hero-banner h2{font-size:20px;font-weight:800;margin-bottom:4px;}
.hero-banner p{font-size:14px;color:rgba(255,255,255,.75);}
.hero-stats{display:flex;gap:24px;margin-top:14px;}
.hero-stat{text-align:center;}
.hero-stat-num{font-size:22px;font-weight:800;color:var(--gold2);}
.hero-stat-label{font-size:11px;color:rgba(255,255,255,.6);margin-top:1px;}

.main-content{flex:1;padding:24px 2rem;max-width:1100px;margin:0 auto;width:100%;}

/* ── BOARD ── */
.board-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px;}
.board-title{font-size:20px;font-weight:800;color:var(--green3);}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.filter-chip{padding:6px 14px;border-radius:var(--r-full);border:1.5px solid var(--g200);font-size:13px;font-weight:600;cursor:pointer;color:var(--g600);background:var(--white);transition:all .15s;}
.filter-chip:hover,.filter-chip.active{border-color:var(--green);background:var(--green-light);color:var(--green);}
.search-wrap{position:relative;}
.search-wrap input{width:200px;padding:8px 12px 8px 32px;border:1.5px solid var(--g200);border-radius:var(--r-full);font-family:inherit;font-size:13px;outline:none;transition:border-color .15s;}
.search-wrap input:focus{border-color:var(--green);}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--g400);font-size:14px;}
.post-table{width:100%;border-collapse:collapse;background:var(--white);border-radius:var(--r-lg);overflow:hidden;border:1.5px solid var(--g100);}
.post-table thead tr{background:var(--g50);border-bottom:1.5px solid var(--g100);}
.post-table th{padding:10px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--g400);text-transform:uppercase;letter-spacing:.5px;}
.post-table td{padding:13px 16px;border-bottom:1px solid var(--g100);font-size:14px;vertical-align:middle;}
.post-table tr:last-child td{border-bottom:none;}
.post-table tbody tr:hover td{background:var(--g50);cursor:pointer;}
.post-title-cell{font-weight:600;color:var(--g800);}
.post-meta{font-size:12px;color:var(--g400);margin-top:3px;}
.post-new{display:inline-block;background:#16a34a;color:#fff;font-size:10px;font-weight:800;padding:1px 5px;border-radius:3px;margin-left:6px;vertical-align:middle;}
.anon-tag{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;background:var(--green-light);color:var(--green);padding:2px 8px;border-radius:var(--r-full);}

/* 상세 */
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--g600);cursor:pointer;margin-bottom:14px;padding:6px 0;}
.back-btn:hover{color:var(--green);}
.post-detail{background:var(--white);border-radius:var(--r-lg);border:1.5px solid var(--g100);}
.post-detail-header{padding:22px 26px;border-bottom:1px solid var(--g100);}
.post-detail-title{font-size:19px;font-weight:800;margin-bottom:10px;}
.post-detail-info{display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
.post-detail-body{padding:22px 26px;line-height:1.85;font-size:15px;border-bottom:1px solid var(--g100);white-space:pre-wrap;}
.post-detail-footer{padding:14px 26px;display:flex;gap:10px;align-items:center;}
.like-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r-full);border:1.5px solid var(--g200);background:transparent;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;color:var(--g600);transition:all .15s;}
.like-btn:hover,.like-btn.liked{border-color:#ef4444;background:#fef2f2;color:#ef4444;}
.comments-section{padding:22px 26px;}
.comments-title{font-size:14px;font-weight:800;margin-bottom:14px;color:var(--green);}
.comment-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.comment-item{background:var(--g50);border-radius:var(--r-md);padding:12px 14px;}
.comment-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.comment-author{font-size:12px;font-weight:700;color:var(--green);}
.comment-time{font-size:11px;color:var(--g400);}
.comment-text{font-size:14px;line-height:1.65;}
.comment-input-area{display:flex;gap:10px;align-items:flex-end;}
.comment-input-area textarea{flex:1;}

/* 교수 */
.prof-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.prof-card{background:var(--white);border:1.5px solid var(--g100);border-radius:var(--r-lg);padding:18px;cursor:pointer;transition:all .15s;}
.prof-card:hover{border-color:var(--green);transform:translateY(-2px);box-shadow:var(--shadow);}
.prof-avatar{width:48px;height:48px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:var(--green);flex-shrink:0;}
.prof-name{font-size:15px;font-weight:800;}
.prof-sub{font-size:12px;color:var(--g400);margin-top:2px;}
.prof-rating{font-size:14px;font-weight:700;color:var(--gold);}
.tag{font-size:11px;font-weight:600;padding:3px 8px;border-radius:var(--r-full);background:var(--g50);color:var(--g600);border:1px solid var(--g100);}

/* 성적 DB */
.score-db-intro{background:var(--green);color:#fff;border-radius:var(--r-lg);padding:20px 24px;margin-bottom:20px;position:relative;overflow:hidden;}
.score-db-intro::after{content:'📊';position:absolute;right:24px;top:50%;transform:translateY(-50%);font-size:48px;opacity:.2;}
.score-db-intro h3{font-size:17px;font-weight:800;margin-bottom:4px;}
.score-db-intro p{font-size:13px;color:rgba(255,255,255,.75);line-height:1.6;}
.score-form-card{background:var(--white);border:1.5px solid var(--g100);border-radius:var(--r-lg);padding:22px;margin-bottom:20px;}
.score-form-title{font-size:15px;font-weight:800;color:var(--green3);margin-bottom:16px;}
.score-entries{display:flex;flex-direction:column;gap:10px;}
.score-entry{background:var(--white);border:1.5px solid var(--g100);border-radius:var(--r-md);padding:14px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.score-entry-info{flex:1;min-width:0;}
.score-entry-subject{font-size:14px;font-weight:700;}
.score-entry-meta{font-size:12px;color:var(--g400);margin-top:2px;}
.score-entry-grade{text-align:center;min-width:60px;}
.grade-letter{font-size:22px;font-weight:800;color:var(--green);}
.grade-gpa{font-size:11px;color:var(--g400);margin-top:1px;}
.score-entry-points{text-align:center;min-width:50px;}
.score-points-num{font-size:16px;font-weight:800;color:var(--g800);}
.score-points-label{font-size:10px;color:var(--g400);}

/* 빈 상태 */
.empty-state{text-align:center;padding:50px 20px;}
.empty-icon{font-size:40px;margin-bottom:10px;}
.empty-title{font-size:14px;font-weight:700;color:var(--g600);margin-bottom:4px;}
.empty-desc{font-size:13px;color:var(--g400);}

@media(max-width:720px){
  .topbar{padding:0 1rem;}.topbar-nav{display:none;}
  .main-content{padding:16px 1rem;}
  .prof-grid{grid-template-columns:1fr 1fr;}
  .form-row{grid-template-columns:1fr;}
  .hero-stats{gap:16px;}
}
</style>
</head>
<body>

<div class="toast-container" id="toasts"></div>
<div class="modal-overlay hidden" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal-box" id="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- AUTH -->
<div id="screen-auth">
  <div class="auth-deco auth-deco-eiffel">🗼</div>
  <div class="auth-deco auth-deco-petal1">🌸</div>
  <div class="auth-deco auth-deco-petal2">🌸</div>
  <div class="auth-deco auth-deco-petal3">🌺</div>
  <div class="auth-box">
    <div class="auth-emblem">🌸</div>
    <div class="auth-title">Ewha France DB</div>
    <div class="auth-subtitle">이화여대 불어불문학과 커뮤니티</div>
    <div class="auth-france">✦ Bienvenue ✦</div>
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchAuthTab('login')">로그인</div>
      <div class="auth-tab" onclick="switchAuthTab('signup')">가입하기</div>
    </div>
    <div id="auth-login">
      <div class="form-stack">
        <div class="input-group">
          <label>이화 이메일</label>
          <input class="input" id="login-email" type="email" placeholder="학번@ewhain.net">
        </div>
        <div class="input-group">
          <label>비밀번호</label>
          <input class="input" id="login-pw" type="password" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <button class="btn btn-primary" style="width:100%;height:44px;" onclick="doLogin()">로그인</button>
      </div>
      <div class="auth-hint">
        데모: <strong>test@ewhain.net</strong> / <strong>1234</strong><br>
        이화 이메일(@ewhain.net)이 있어야 가입 가능해요
      </div>
    </div>
    <div id="auth-signup" class="hidden">
      <div class="form-stack">
        <div class="input-group">
          <label>이화 이메일 *</label>
          <input class="input" id="su-email" type="email" placeholder="학번@ewhain.net">
        </div>
        <div class="form-row">
          <div class="input-group">
            <label>학번 *</label>
            <select class="select" id="su-year">
              <option value="">선택</option>
              <option>18학번</option><option>19학번</option><option>20학번</option>
              <option>21학번</option><option>22학번</option><option>23학번</option>
              <option>24학번</option><option>25학번</option><option>26학번</option>
            </select>
          </div>
          <div class="input-group">
            <label>비밀번호 *</label>
            <input class="input" id="su-pw" type="password" placeholder="6자 이상">
          </div>
        </div>
        <button class="btn btn-primary" style="width:100%;height:44px;" onclick="doSignup()">가입하기</button>
      </div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="screen-app" class="hidden">
  <div class="topbar">
    <div class="topbar-brand" onclick="navigate('board','free')">
      <span class="topbar-logo-icon">🌸</span>
      <span class="topbar-logo-text">Ewha <span>France</span> DB</span>
    </div>
    <div class="topbar-nav">
      <div class="topbar-nav-item" data-page="board-free" onclick="navigate('board','free')">자유게시판</div>
      <div class="topbar-nav-item" data-page="board-review" onclick="navigate('board','review')">강의평</div>
      <div class="topbar-nav-item" data-page="board-exam" onclick="navigate('board','exam')">시험정보</div>
      <div class="topbar-nav-item" data-page="board-notice" onclick="navigate('board','notice')">공지</div>
      <div class="topbar-nav-item" data-page="professors" onclick="navigate('professors')">교수님</div>
      <div class="topbar-nav-item" data-page="scoredb" onclick="navigate('scoredb')">성적DB</div>
    </div>
    <div class="topbar-right">
      <span class="topbar-nick" id="topbar-nick"></span>
      <button class="topbar-logout" onclick="logout()">로그아웃</button>
    </div>
  </div>
  <div id="hero-wrap"></div>
  <div class="main-content" id="main-content"></div>
</div>

<script>
// ── STORE ──
const LS={get(k){try{return JSON.parse(localStorage.getItem('ef3_'+k))||null}catch(e){return null}},set(k,v){localStorage.setItem('ef3_'+k,JSON.stringify(v))},del(k){localStorage.removeItem('ef3_'+k)}};

// ── SEED ──
function seed(){
  if(LS.get('seeded2'))return;
  LS.set('users',{demo:{id:'demo',email:'test@ewhain.net',pw:'1234',year:'22학번'}});
  LS.set('posts',[
    {id:'p1',type:'free',title:'불문과 선배님들 자기소개해요 😊',content:'안녕하세요! 25학번 새내기인데요, 선배님들 많이 알고 싶어요. 불문과 생활 어떠세요? 좋은 점 나쁜 점 다 알고 싶어요 ㅎㅎ',authorId:'demo',createdAt:'2026-06-10T10:00:00',views:142,likes:['u1','u2'],comments:[
      {id:'c1',authorId:'demo',text:'반가워요! 불문과 정말 좋아요. 교수님들이 다들 친절하시고 과 분위기도 따뜻해요 🌸',createdAt:'2026-06-10T11:00:00'},

// 댓글: 같은 글에서 authorId 순서로 "불문 22학번-1", "-2" ...
function getPostAnon(post, users){
  const u = users[post.authorId];
  if(post.authorId==='admin') return '관리자';
  return '불문 ' + (u?.year||'?');
}
function getCommentAnon(comment, postAuthorId, allComments, users){
  // 댓글 작성자 중 고유 authorId 목록 (순서 유지)
  const uniqueAuthors = [];
  allComments.forEach(c=>{
    if(!uniqueAuthors.includes(c.authorId)) uniqueAuthors.push(c.authorId);
  });
  const idx = uniqueAuthors.indexOf(comment.authorId) + 1;
  const u = users[comment.authorId];
  const year = u?.year||'?';
  return `불문 ${year}-${idx}`;
}
function getScoreAnon(score, users){
  const u = users[score.authorId];
  return '불문 ' + (u?.year||'?');
}

function switchAuthTab(tab){
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='login')||(i===1&&tab==='signup')));
  document.getElementById('auth-login').classList.toggle('hidden',tab!=='login');
  document.getElementById('auth-signup').classList.toggle('hidden',tab!=='signup');
}
function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pw=document.getElementById('login-pw').value;
  if(!email||!pw){toast('이메일과 비밀번호를 입력해 주세요','error');return;}
  if(!email.includes('@ewhain.net')&&!email.includes('@ewha.ac.kr')){toast('이화 이메일(@ewhain.net)만 접속 가능합니다','error');return;}
  const users=LS.get('users')||{};
  const user=Object.values(users).find(u=>u.email===email&&u.pw===pw);
  if(!user){toast('이메일 또는 비밀번호가 틀렸습니다','error');return;}
  loginAs(user);
}
function doSignup(){
  const email=document.getElementById('su-email').value.trim();
  const year=document.getElementById('su-year').value;
  const pw=document.getElementById('su-pw').value;
  if(!email||!year||!pw){toast('모든 항목을 입력해 주세요','error');return;}
  if(!email.includes('@ewhain.net')&&!email.includes('@ewha.ac.kr')){toast('이화 이메일(@ewhain.net)만 가입 가능합니다','error');return;}
  if(pw.length<6){toast('비밀번호는 6자 이상이어야 해요','error');return;}
  const users=LS.get('users')||{};
  if(Object.values(users).find(u=>u.email===email)){toast('이미 가입된 이메일입니다','error');return;}
  const id='u_'+Date.now();
  users[id]={id,email,pw,year};
  LS.set('users',users);
  loginAs(users[id]);
}
function loginAs(user){
  currentUser=user;
  LS.set('cu',user.id);
  document.getElementById('screen-auth').classList.add('hidden');
  document.getElementById('screen-app').classList.remove('hidden');
  document.getElementById('topbar-nick').textContent='불문 '+(user.year||'');
  navigate('board','free');
  toast('Bienvenue, 불문 '+(user.year||'')+'님! 🌸');
}
function logout(){
  currentUser=null;LS.del('cu');

  document.getElementById('screen-auth').classList.remove('hidden');
}

  const rows=posts.length?posts.map((p,i)=>`
    <tr onclick="openPost('${p.id}')">
      <td style="width:36px;text-align:center;color:var(--g400);font-size:12px;">${posts.length-i}</td>
      <td class="post-title-cell">
        ${escHtml(p.title)}${isNew(p.createdAt)?'<span class="post-new">NEW</span>':''}
        ${p.professor?`<span class="badge badge-green" style="margin-left:6px;">${p.professor}</span>`:''}
        <div class="post-meta"><span class="anon-tag">🌸 ${getPostAnon(p,users)}</span> · ${formatDate(p.createdAt)} · 댓글 ${p.comments.length}</div>
      </td>
      <td style="width:52px;text-align:center;font-size:12px;color:var(--g400);">${p.views}</td>
      <td style="width:52px;text-align:center;font-size:12px;color:#ef4444;">❤ ${p.likes.length}</td>
    </tr>`).join(''):`<tr><td colspan="4"><div class="empty-state"><div class="empty-icon">${boardMeta[type].icon}</div><div class="empty-title">아직 글이 없어요</div><div class="empty-desc">첫 번째 글을 남겨보세요!</div></div></td></tr>`;
  return `
    <div class="board-header">
      <div></div>
      <div style="display:flex;gap:8px;align-items:center;">
        <div class="search-wrap"><span class="search-icon">🔍</span><input id="search-input" placeholder="검색..." oninput="searchPosts()"></div>

      <tbody id="post-tbody">${rows}</tbody>
    </table>`;
}

  const tbody=document.getElementById('post-tbody');
  if(!tbody)return;
  tbody.innerHTML=filtered.length?filtered.map((p,i)=>`
    <tr onclick="openPost('${p.id}')">
      <td style="width:36px;text-align:center;color:var(--g400);font-size:12px;">${filtered.length-i}</td>
      <td class="post-title-cell">${escHtml(p.title)}${isNew(p.createdAt)?'<span class="post-new">NEW</span>':''}${p.professor?`<span class="badge badge-green" style="margin-left:6px;">${p.professor}</span>`:''}

}

function openPost(id){
  const posts=LS.get('posts')||[];
  const users=LS.get('users')||{};
  const i=posts.findIndex(p=>p.id===id);
  if(i<0)return;
  posts[i].views++; LS.set('posts',posts);
  currentPost=id;
  const p=posts[i];
  const liked=p.likes.includes(currentUser.id);
  const isAuthor=p.authorId===currentUser.id;
  const commentsHtml=p.comments.length?p.comments.map(c=>`
    <div class="comment-item">
      <div class="comment-header">
        <span class="comment-author">🌸 ${getCommentAnon(c, p.authorId, p.comments, users)}</span>
        <span class="comment-time">${formatDate(c.createdAt)}</span>
      </div>
      <div class="comment-text">${escHtml(c.text)}</div>
    </div>`).join(''):`<div style="text-align:center;color:var(--g400);font-size:13px;padding:20px;">첫 댓글을 남겨보세요!</div>`;
  document.getElementById('main-content').innerHTML=`
    <div class="back-btn" onclick="navigate('board','${p.type}')">← ${boardMeta[p.type].label}로 돌아가기</div>
    <div class="post-detail">
      <div class="post-detail-header">

          <span class="anon-tag">🌸 ${getPostAnon(p,users)}</span>
          <span style="font-size:12px;color:var(--g400);">${formatDate(p.createdAt)}</span>
          <span style="font-size:12px;color:var(--g400);">조회 ${p.views}</span>
          ${isAuthor?`<button class="btn btn-danger btn-sm" onclick="deletePost('${p.id}')">삭제</button>`:''}
        </div>
      </div>
      <div class="post-detail-body">${escHtml(p.content)}</div>
      <div class="post-detail-footer">
        <button class="like-btn${liked?' liked':''}" id="like-btn" onclick="toggleLike('${p.id}')">❤ 좋아요 <span id="like-count">${p.likes.length}</span></button>
      </div>

          <textarea class="textarea" id="comment-input" placeholder="댓글을 익명으로 남겨요..." rows="2" style="min-height:60px;"></textarea>

        </div>
      </div>
    </div>`;
}

function toggleLike(id){
  const posts=LS.get('posts')||[];
  const i=posts.findIndex(p=>p.id===id);
  if(i<0)return;
  const idx=posts[i].likes.indexOf(currentUser.id);
  if(idx>=0)posts[i].likes.splice(idx,1); else posts[i].likes.push(currentUser.id);
  LS.set('posts',posts);
  const liked=posts[i].likes.includes(currentUser.id);
  document.getElementById('like-btn')?.classList.toggle('liked',liked);
  const cnt=document.getElementById('like-count');
  if(cnt)cnt.textContent=posts[i].likes.length;
}

function submitComment(id){
  const input=document.getElementById('comment-input');
  const text=input?.value.trim()||'';
  if(!text){toast('댓글을 입력해 주세요','error');return;}
  const posts=LS.get('posts')||[];
  const i=posts.findIndex(p=>p.id===id);
  if(i<0)return;
  posts[i].comments.push({id:'c_'+Date.now(),authorId:currentUser.id,text,createdAt:new Date().toISOString()});
  LS.set('posts',posts);
  toast('댓글이 등록되었습니다');
  openPost(id);
}

function deletePost(id){
  if(!confirm('정말 삭제할까요?'))return;
  LS.set('posts',(LS.get('posts')||[]).filter(p=>p.id!==id));
  toast('삭제되었습니다');
  navigate('board',currentBoard);
}

function submitPost(type){

  const content=document.getElementById('wf-content').value.trim();
  if(!title||!content){toast('제목과 내용을 입력해 주세요','error');return;}
  const posts=LS.get('posts')||[];
  const id='p_'+Date.now();
  posts.push({id,type,title,content,authorId:currentUser.id,createdAt:new Date().toISOString(),
    views:0,likes:[],comments:[],
    professor:document.getElementById('wf-prof')?.value.trim()||'',
    subject:document.getElementById('wf-subj')?.value.trim()||'',
    rating:parseInt(document.getElementById('wf-rating')?.value||5)});
  LS.set('posts',posts);
  closeModal();

const gradeTable=[
  {min:95,letter:'A+',gpa:4.3},{min:90,letter:'A',gpa:4.0},{min:85,letter:'B+',gpa:3.5},
  {min:80,letter:'B',gpa:3.0},{min:75,letter:'C+',gpa:2.5},{min:70,letter:'C',gpa:2.0},
  {min:65,letter:'D+',gpa:1.5},{min:60,letter:'D',gpa:1.0},{min:0,letter:'F',gpa:0.0}
];
function scoreToGrade(score){return gradeTable.find(g=>score>=g.min)||gradeTable[gradeTable.length-1];}

function renderScoreDB(){
  const users=LS.get('users')||{};
  const scores=(LS.get('scores')||[]).slice().reverse();
  const bySubject={};
  scores.forEach(s=>{
    const key=`${s.professor}__${s.subject}__${s.semester||''}`;
    if(!bySubject[key])bySubject[key]={professor:s.professor,subject:s.subject,semester:s.semester,entries:[]};
    bySubject[key].entries.push(s);
  });
  const groups=Object.values(bySubject);

  const groupHtml=groups.length?groups.map(g=>{
    const confirmedEntries=g.entries.filter(e=>e.gradeConfirmed); // 실제 등급 확정된 데이터
    const allEntries=g.entries;
    const avg=Math.round(allEntries.reduce((a,e)=>a+e.score,0)/allEntries.length*10)/10;
    // 확정 데이터 기반 예측: 확정 데이터가 있으면 그 분포로 예측, 없으면 절대기준
    let predictionMsg='';
    if(confirmedEntries.length>=2){
      // 확정 데이터의 등급별 최소 점수 계산
      const gradeMinMap={};
      confirmedEntries.forEach(e=>{
        if(!gradeMinMap[e.grade]||e.score<gradeMinMap[e.grade])gradeMinMap[e.grade]=e.score;
      });
      const grades=['A+','A','B+','B','C+','C','D+','D','F'];
      const lines=grades.filter(g=>gradeMinMap[g]!==undefined).map(gr=>`<span style="display:inline-flex;align-items:center;gap:4px;background:rgba(255,255,255,.15);border-radius:4px;padding:2px 8px;font-size:12px;"><strong>${gr}</strong> ${gradeMinMap[gr]}점~</span>`).join(' ');
      predictionMsg=`<div style="margin-top:8px;font-size:12px;color:rgba(255,255,255,.8);">📊 ${g.semester} 기준 등급 커트라인</div><div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;">${lines}</div>`;
    } else if(confirmedEntries.length===1){
      predictionMsg=`<div style="margin-top:8px;font-size:12px;color:rgba(255,255,255,.7);">📊 데이터 1개 수집됨 — 더 쌓이면 예측이 정확해져요!</div>`;
    } else {
      predictionMsg=`<div style="margin-top:8px;font-size:12px;color:rgba(255,255,255,.6);">📊 아직 확정 등급 데이터 없음 — 절대기준 예측만 가능해요</div>`;
    }

    const rows=allEntries.map(e=>{
      // 이 과목의 확정 데이터 기반으로 이 점수의 예측 등급 계산
      let predLabel='';
      if(confirmedEntries.length>=2){
        const sorted=confirmedEntries.slice().sort((a,b)=>b.score-a.score);
        // 이 점수보다 낮은 확정 데이터들의 등급 중 가장 높은 걸 찾아서 예측
        const gradeMinMap2={};
        confirmedEntries.forEach(ce=>{if(!gradeMinMap2[ce.grade]||ce.score<gradeMinMap2[ce.grade])gradeMinMap2[ce.grade]=ce.score;});
        const gradeOrder=['A+','A','B+','B','C+','C','D+','D','F'];
        let predicted='F';
        for(const gr of gradeOrder){if(gradeMinMap2[gr]!==undefined&&e.score>=gradeMinMap2[gr]){predicted=gr;break;}}
        predLabel=`<span style="font-size:11px;background:var(--green-light);color:var(--green);padding:2px 7px;border-radius:4px;font-weight:700;">과거 기준 ${predicted}</span>`;
      }
      return `
      <div class="score-entry">
        <div style="font-size:12px;min-width:80px;"><span class="anon-tag" style="font-size:11px;">🌸 ${getScoreAnon(e,users)}</span></div>
        <div class="score-entry-points"><div class="score-points-num">${e.score}점</div><div class="score-points-label">총점</div></div>
        <div style="font-size:18px;color:var(--g200);">→</div>
        <div class="score-entry-grade">
          <div class="grade-letter">${e.gradeConfirmed?e.grade:'?'}</div>
          <div class="grade-gpa">${e.gradeConfirmed?e.gpa.toFixed(1)+' / 4.3':'미발표'}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:3px;">${predLabel}<div style="font-size:11px;color:var(--g400);">${formatDate(e.createdAt)}</div></div>
        ${e.authorId===currentUser.id?`<div style="margin-left:auto;display:flex;gap:6px;">${!e.gradeConfirmed?`<button class="btn btn-primary btn-sm" onclick="openConfirmGrade('${e.id}')">등급 입력</button>`:''}<button class="btn btn-danger btn-sm" onclick="deleteScore('${e.id}')">삭제</button></div>`:''}
      </div>`;
    }).join('');

    return `<div class="card" style="margin-bottom:14px;">
      <div style="background:var(--green);border-radius:var(--r-md);padding:14px 16px;margin-bottom:12px;color:#fff;">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px;">
          <div>
            <div style="font-size:15px;font-weight:800;">${g.subject} <span style="font-weight:500;font-size:13px;opacity:.8;">— ${g.professor} 교수님</span></div>
            <div style="font-size:12px;opacity:.7;margin-top:2px;">${g.semester||''} · ${allEntries.length}명 데이터 · 확정 ${confirmedEntries.length}명</div>
          </div>
          <div style="text-align:center;background:rgba(255,255,255,.15);border-radius:var(--r-md);padding:8px 14px;">
            <div style="font-size:10px;opacity:.7;">평균 총점</div>
            <div style="font-size:22px;font-weight:800;color:var(--gold2);">${avg}점</div>
          </div>
        </div>
        ${predictionMsg}
      </div>
      <div class="score-entries">${rows}</div>
    </div>`;
  }).join(''):`<div class="empty-state"><div class="empty-icon">📊</div><div class="empty-title">아직 데이터가 없어요</div><div class="empty-desc">첫 번째로 내 성적 데이터를 올려보세요!</div></div>`;

  // 중간고사 → 기말 계산기
  const calcHtml=`
    <div class="card" style="margin-bottom:20px;border:2px solid var(--green-mid);">
      <div style="font-size:15px;font-weight:800;color:var(--green3);margin-bottom:4px;">🧮 중간고사 → 기말 목표 계산기</div>
      <div style="font-size:13px;color:var(--g400);margin-bottom:16px;">중간고사 점수와 비율을 입력하면 원하는 등급에 필요한 기말 점수를 계산해요</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px;">
        <div class="input-group"><label>중간고사 점수</label><input class="input" id="calc-mid" type="number" min="0" max="100" placeholder="예: 75" oninput="calcFinal()"></div>
        <div class="input-group"><label>중간 비율 (%)</label><input class="input" id="calc-mid-ratio" type="number" min="0" max="100" placeholder="예: 40" oninput="calcFinal()"></div>
        <div class="input-group"><label>기말 비율 (%)</label><input class="input" id="calc-final-ratio" type="number" min="0" max="100" placeholder="예: 40" oninput="calcFinal()"></div>
      </div>
      <div class="input-group" style="margin-bottom:12px;"><label>출석+기타 점수 (있으면)</label><input class="input" id="calc-etc" type="number" min="0" max="100" placeholder="예: 10 (없으면 0)" value="0" oninput="calcFinal()"></div>
      <div id="calc-final-result" class="hidden">
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;" id="calc-final-grid"></div>
        <div style="font-size:12px;color:var(--g400);margin-top:10px;text-align:center;">※ 상대평가 과목은 실제 등급이 다를 수 있어요</div>
      </div>
    </div>`;

  return `
    <div class="score-db-intro">
      <h3>함께 쌓는 성적 데이터 🌸</h3>
      <p>총점은 알지만 등급 발표 전일 때 — 선배들 데이터로 미리 예측해요! 등급 나오면 꼭 업데이트 해주세요 🙏<br>모든 데이터는 <strong>익명</strong>으로 등록됩니다.</p>
    </div>
    ${calcHtml}
    <div style="display:flex;justify-content:flex-end;margin-bottom:16px;">
      <button class="btn btn-primary" onclick="openAddScore()">+ 내 성적 데이터 올리기</button>
    </div>
    ${groupHtml}`;
}

function previewGrade(){
  const score=parseFloat(document.getElementById('sc-score').value);
  const subj=(document.getElementById('sc-subj')||{value:''}).value.trim();
  const prof=(document.getElementById('sc-prof')||{value:''}).value;
  const sem=(document.getElementById('sc-sem')||{value:''}).value;
  const preview=document.getElementById('sc-preview');
  if(isNaN(score)||score<0||score>100){preview.classList.add('hidden');return;}
  const g=scoreToGrade(score);
  document.getElementById('sc-preview-letter').textContent=g.letter;
  document.getElementById('sc-preview-gpa').textContent=g.gpa.toFixed(1)+' / 4.3';
  // 과거 데이터 기반 예측
  const pastEl=document.getElementById('sc-preview-past');
  if(subj&&prof&&sem){
    const scores=LS.get('scores')||[];
    const confirmed=scores.filter(s=>s.professor===prof&&s.subject===subj&&s.gradeConfirmed);
    if(confirmed.length>=2){
      const gradeMinMap={};
      confirmed.forEach(e=>{if(!gradeMinMap[e.grade]||e.score<gradeMinMap[e.grade])gradeMinMap[e.grade]=e.score;});
      const gradeOrder=['A+','A','B+','B','C+','C','D+','D','F'];
      let predicted='F';
      for(const gr of gradeOrder){if(gradeMinMap[gr]!==undefined&&score>=gradeMinMap[gr]){predicted=gr;break;}}
      pastEl.textContent=`📊 과거 데이터 기준 → ${predicted} 예상 (${confirmed.length}명 기준)`;
    } else {
      pastEl.textContent='📊 아직 과거 데이터 부족 — 절대기준으로만 예측';
    }
  } else { pastEl.textContent=''; }
  preview.classList.remove('hidden');
}

function submitScore(){
  const prof=document.getElementById('sc-prof').value;
  const sem=document.getElementById('sc-sem').value;
  const subj=document.getElementById('sc-subj').value.trim();
  const scoreVal=parseFloat(document.getElementById('sc-score').value);
  const gradeInput=document.getElementById('sc-grade').value;
  if(!prof||!sem||!subj||isNaN(scoreVal)){toast('필수 항목을 모두 입력해 주세요','error');return;}
  const auto=scoreToGrade(scoreVal);
  const gradeConfirmed=!!gradeInput;
  const finalGrade=gradeInput||auto.letter;
  const finalGpa=(gradeTable.find(g=>g.letter===finalGrade)||auto).gpa;
  const scores=LS.get('scores')||[];
  scores.push({id:'s_'+Date.now(),authorId:currentUser.id,professor:prof,subject:subj,
    semester:sem,score:scoreVal,grade:finalGrade,gpa:finalGpa,
    gradeConfirmed,createdAt:new Date().toISOString()});
  LS.set('scores',scores);
  closeModal();
  toast(gradeConfirmed?'등급 데이터가 등록됐어요! 다들 감사해할 거예요 🌸':'총점 데이터 등록 완료! 등급 나오면 꼭 업데이트해 주세요 🙏','success');
  navigate('scoredb');
}

function confirmGrade(id){
  const grade=document.getElementById('confirm-grade').value;
  if(!grade){toast('등급을 선택해 주세요','error');return;}
  const scores=LS.get('scores')||[];
  const i=scores.findIndex(s=>s.id===id);
  if(i<0)return;
  scores[i].grade=grade;
  scores[i].gpa=(gradeTable.find(g=>g.letter===grade)||{gpa:0}).gpa;
  scores[i].gradeConfirmed=true;
  LS.set('scores',scores);
  closeModal();
  toast('등급이 업데이트됐어요! 덕분에 예측이 더 정확해졌어요 🌸','success');
  navigate('scoredb');
}

function calcFinal(){
  const mid=parseFloat(document.getElementById('calc-mid').value);
  const midR=parseFloat(document.getElementById('calc-mid-ratio').value);
  const finalR=parseFloat(document.getElementById('calc-final-ratio').value);
  const etc=parseFloat(document.getElementById('calc-etc').value)||0;
  const res=document.getElementById('calc-final-result');
  if(isNaN(mid)||isNaN(midR)||isNaN(finalR)||finalR===0){res.classList.add('hidden');return;}
  const midPoints=mid*(midR/100);
  const targets=['A+','A','B+','B','C+'];
  const targetScores=targets.map(t=>{
    const need=gradeTable.find(g=>g.letter===t);
    if(!need)return null;
    const required=((need.min-midPoints-etc)/(finalR/100));
    return {grade:t,score:Math.ceil(required*10)/10};
  }).filter(Boolean);
  const grid=document.getElementById('calc-final-grid');
  if(!grid){res.classList.add('hidden');return;}
  grid.innerHTML=targetScores.map(t=>{
    const impossible=t.score>100;
    const easy=t.score<=60;
    const color=impossible?'#dc2626':easy?'var(--green)':'var(--g800)';
    const bg=impossible?'#fef2f2':easy?'var(--green-light)':'var(--g50)';
    const msg=impossible?'불가':'가능';
    return `<div style="background:${bg};border-radius:var(--r-md);padding:12px;text-align:center;">
      <div style="font-size:18px;font-weight:800;color:${color};">${t.grade}</div>
      <div style="font-size:22px;font-weight:800;color:${color};margin:4px 0;">${impossible?'100점↑':t.score+'점'}</div>
      <div style="font-size:11px;color:${color};font-weight:600;">${msg}</div>
    </div>`;
  }).join('');
  res.classList.remove('hidden');
}

function deleteScore(id){
  if(!confirm('삭제할까요?'))return;
  LS.set('scores',(LS.get('scores')||[]).filter(s=>s.id!==id));
  toast('삭제되었습니다');
  navigate('scoredb');
}

// ── UTILS ──
function isNew(iso){return (new Date()-new Date(iso))<1000*60*60*48;}
function formatDate(iso){try{const d=new Date(iso);const diff=new Date()-d;if(diff<60000)return '방금';if(diff<3600000)return Math.floor(diff/60000)+'분 전';if(diff<86400000)return Math.floor(diff/3600000)+'시간 전';return d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0');}catch(e){return '';}}
function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function openModal(title,body){document.getElementById('modal-title').textContent=title;document.getElementById('modal-body').innerHTML=body;document.getElementById('modal-overlay').classList.remove('hidden');}
function closeModal(e){if(e&&e.target!==document.getElementById('modal-overlay'))return;document.getElementById('modal-overlay').classList.add('hidden');}
function toast(msg,type=''){const c=document.getElementById('toasts');const t=document.createElement('div');t.className='toast'+(type?' '+type:'');t.textContent=msg;c.appendChild(t);setTimeout(()=>t.remove(),3000);}
